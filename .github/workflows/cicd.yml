name: Java CI with Gradle
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: temurin

      - name: Grant execute permission for gradlew
        # 1. Kmarket 폴더 안으로 이동해서 권한을 부여합니다.
        working-directory: ./Kmarket
        run: chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2.6.0
        with:
          arguments: build
          # 2. 빌드할 대상 프로젝트가 Kmarket 폴더에 있음을 명시합니다.
          build-root-directory: ./Kmarket

      - name: Get JAR_FILE
        id: jarfile
        # 3. Kmarket 폴더 내부에서 빌드된 JAR 파일을 찾습니다.
        working-directory: ./Kmarket
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain | head -n 1)
          # 다음 업로드 단계를 위해 경로에 폴더명을 붙여서 환경변수로 저장합니다.
          echo "JAR_FILE=Kmarket/${JAR_FILE}" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ${{ env.JAR_FILE }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build/libs/

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.AWS_EC2_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Copy JAR to EC2
        run: |
          JAR_FILE=$(ls build/libs/*.jar | head -n 1)
          scp -i private_key.pem \
            -o StrictHostKeyChecking=no \
            $JAR_FILE \
            ${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }}:/home/${{ secrets.AWS_EC2_USER }}/
      
      - name: Restart Spring Application on EC2
        run: |
          JAR_FILE=$(basename $(ls build/libs/*.jar | head -n 1))
          ssh -i private_key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.AWS_EC2_USER }}@${{ secrets.AWS_EC2_HOST }} << EOF
            ln -sf /home/${{ secrets.AWS_EC2_USER }}/$JAR_FILE /home/${{ secrets.AWS_EC2_USER }}/app.jar
            sudo systemctl restart spring-kmarket-app
          EOF

      - name: Cleanup
        run: rm -f private_key.pem
