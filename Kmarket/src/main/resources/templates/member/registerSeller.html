<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>판매자 회원가입</title>
    <link rel="stylesheet" href="../css/member/registerSeller.css"/>
    <link rel="stylesheet" href="../css/main.css"/>
    <script th:src="@{/js/postcode.js}"></script>
    <script th:src="@{/js/validationSeller.js}"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
<th:block th:replace="~{common/_main_header}"></th:block>


<main class="container">
    <div class="seller-form-wrapper">
        <div class="form-header">
            <h2>판매자 회원가입</h2>
            <p>판매 활동을 위한 사업자 정보를 입력해주세요.</p>
        </div>

        <form th:action="@{/member/registerSeller}" method="post">
            <!-- 계정정보 -->
            <section class="form-section">
                <h3>계정정보</h3>

                <div class="input-row">
                    <label>아이디</label>

                    <div class="input-with-btn">
                        <input type="text" class="input-field" name="memberId" placeholder="아이디 입력">
                        <button type="button" class="inline-btn" id="btnUserid">중복확인</button>
                    </div>

                    <span class="useridResult"></span>
                </div>

                <div class="input-row">
                    <label>비밀번호</label>

                    <input type="password" class="input-field" name="password" placeholder="비밀번호 입력">

                    <span class="passResult"></span>
                </div>

                <div class="input-row">
                    <label>비밀번호 확인</label>

                    <input type="password" class="input-field" name="password2" placeholder="비밀번호 재입력">
                </div>

            </section>

            <!-- 사업자 정보 -->
            <section class="form-section">
                <h3>사업자 정보</h3>

                <div class="input-row">
                    <label>상호명</label>

                    <input type="text" class="input-field" name="companyName" placeholder="상호명 입력">

                    <span class="companyResult"></span>
                </div>

                <div class="input-row">
                    <label>대표자명</label>

                    <input type="text" class="input-field" name="ceoName"  placeholder="대표자명 입력">

                    <span class="ceoResult"></span>
                </div>

                <div class="input-row">
                    <label>사업자등록번호</label>
                    <input
                            type="text"
                            class="input-field"
                            name="bizNo"
                            maxlength="12"
                            placeholder="ex) 123-45-67890"
                    >

                    <span class="bizNoResult"></span>
                </div>

                <div class="input-row">
                    <label>통신판매업번호</label>

                    <input type="text" class="input-field" name="onlineSaleNo"  placeholder="ex) 2025-서울강남-1234">

                    <span class="onlineSaleNoResult"></span>
                </div>

                <div class="input-row">
                    <label>전화번호</label>

                    <input type="text" class="input-field" name="tel"  placeholder="전화번호 입력">

                    <span class="telResult"></span>
                </div>

                <div class="input-row">
                    <label>팩스</label>

                    <input type="text" class="input-field" name="fax"  placeholder="ex) 02-1234-5678">

                    <span class="faxResult"></span>
                </div>

                <div class="input-row">
                    <label>주소</label>

                    <div class="address-group">

                        <div class="input-with-btn">
                            <input
                                    type="text"
                                    class="input-field"
                                    id="zip"
                                    name="zip"
                                    placeholder="우편번호"
                                    readonly
                            >
                            <button type="button" onclick="postcode()" class="inline-btn">주소검색</button>
                        </div>

                        <input
                                type="text"
                                class="input-field"
                                id="addr1"
                                name="addr1"
                                placeholder="기본주소"
                                readonly
                        >

                        <input
                                type="text"
                                class="input-field"
                                id="addr2"
                                name="addr2"
                                placeholder="상세주소"
                        >

                    </div>

                </div>

            </section>

            <div class="btn-group">
                <!-- <button type="button" class="action-btn prev">이전으로</button> -->

                <button type="submit" class="action-btn submit">
                    판매자 회원가입
                </button>
            </div>
        </form>
    </div>
</main>

<!-- Footer -->
<th:block th:replace="~{common/_admin_footer}"></th:block>

</body>
</html>
