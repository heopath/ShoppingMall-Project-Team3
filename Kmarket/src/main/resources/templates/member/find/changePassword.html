<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 변경</title>
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/member/find/common.css" />
    <link rel="stylesheet" href="../../css/member/find/changePassword.css" />
  </head>
  <body>
  <th:block th:replace="~{common/_main_header}"></th:block>


  <main class="main-layout">
      <div class="find-card">
        <div class="form-title-group">
          <h2>비밀번호 변경</h2>
          <p>안전한 계정 관리를 위해 새로운 비밀번호를 설정해주세요.</p>
        </div>

        <div class="find-content active">
          <div class="form-row">
            <label>아이디</label>
            <span class="user-id">honggildong</span>
          </div>

          <div class="form-row">
            <label>새 비밀번호</label>

            <div class="password-group">
              <input type="password" placeholder="새 비밀번호 입력" />

              <span class="hint success"> 사용 가능한 비밀번호입니다. </span>
            </div>
          </div>

          <div class="form-row">
            <label>새 비밀번호 확인</label>

            <input type="password" placeholder="새 비밀번호 확인 입력" />
          </div>

          <p class="guide">
            영문, 숫자, 특수문자를 포함하여 8자 이상 입력해주세요.
          </p>
        </div>

        <div class="btn-area">
          <a href="../login.html" class="btn-cancel">취소</a>
          <a href="#" class="btn-submit">비밀번호 변경</a>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <th:block th:replace="~{common/_admin_footer}"></th:block>

  </body>
</html>
