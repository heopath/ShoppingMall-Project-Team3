<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>아이디 찾기</title>
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/member/find/common.css" />
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const tabBtns = document.querySelectorAll(".tab-btn");
        const contents = document.querySelectorAll(".find-content");

        tabBtns.forEach(function (btn) {
          btn.addEventListener("click", function () {
            tabBtns.forEach(function (tab) {
              tab.classList.remove("active");
            });

            contents.forEach(function (content) {
              content.classList.remove("active");
            });

            btn.classList.add("active");

            const target = btn.dataset.tab;

            document.getElementById(target + "-tab").classList.add("active");
          });
        });
      });
    </script>
  </head>
  <body>
  <th:block th:replace="~{common/_main_header}"></th:block>




    <main class="main-layout">
      <div class="find-card">
        <div class="form-title-group">
          <h2>아이디 찾기</h2>
          <p>가입 시 등록한 정보로 아이디를 찾을 수 있습니다.</p>
        </div>

        <div class="find-tab">
          <button class="tab-btn active" data-tab="email">이메일 인증</button>

          <button class="tab-btn" data-tab="phone">휴대폰 인증</button>
        </div>

        <!-- 이메일 인증 -->
        <div class="find-content active" id="email-tab">
          <div class="form-row">
            <label>이름</label>
            <input type="text" placeholder="이름 입력" />
          </div>

          <div class="form-row">
            <label>이메일</label>

            <div class="verify-group">
              <input type="email" placeholder="이메일 입력" />
              <button type="button">인증받기</button>
            </div>
          </div>

          <p class="guide">가입 시 등록한 이메일로 인증번호가 발송됩니다.</p>
        </div>

        <!-- 휴대폰 인증 -->
        <div class="find-content" id="phone-tab">
          <div class="form-row">
            <label>이름</label>
            <input type="text" placeholder="이름 입력" />
          </div>

          <div class="form-row">
            <label>휴대폰번호</label>

            <div class="verify-group">
              <input type="text" placeholder="'-' 없이 입력" />
              <button type="button">인증받기</button>
            </div>
          </div>

          <div class="form-row">
            <label>인증번호</label>

            <div class="verify-group">
              <input type="text" placeholder="인증번호 입력" />
              <button type="button">확인</button>
            </div>
          </div>

          <p class="guide">
            가입 시 등록한 휴대폰 번호로 인증번호가 발송됩니다.
          </p>
        </div>

        <div class="btn-area">
          <a href="../login.html" class="btn-cancel">취소</a>
          <a href="./resultId.html" class="btn-submit">다음</a>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <th:block th:replace="~{common/_admin_footer}"></th:block>

  </body>
</html>
