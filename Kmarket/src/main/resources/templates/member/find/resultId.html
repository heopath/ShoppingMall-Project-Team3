<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <th:block th:replace="~{common/_site_head :: head('아이디 결과')}"></th:block>
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/member/find/common.css" />
    <link rel="stylesheet" href="../../css/member/find/resultId.css" />
  </head>
  <body>
  <th:block th:replace="~{common/_main_header}"></th:block>



  <main class="main-layout">
      <div class="find-card">
        <div class="form-title-group">
          <h2>아이디 찾기 결과</h2>
          <p>입력하신 정보와 일치하는 계정을 찾았습니다.</p>
        </div>

        <table class="result-table">
          <tr>
            <th>이름</th>
            <td>[[${member.name}]]</td>
          </tr>
          <tr>
            <th>아이디</th>
            <td class="result-id">[[${member.memberId}]]</td>
          </tr>
          <tr>
            <th>이메일</th>
            <td>[[${member.email}]]</td>
          </tr>
          <tr>
            <th>가입일</th>
            <td>[[${#temporals.format(member.regDate, 'yyyy-MM-dd')}]]</td>
          </tr>
        </table>

        <div class="result-message">고객님의 정보와 일치하는 아이디입니다.</div>

        <div class="btn-area">
          <a th:href="@{/member/login}" class="btn-cancel">로그인</a>
          <a th:href="@{/member/find/password}" class="btn-submit">비밀번호 찾기</a>
        </div>
      </div>
    </main>

    <th:block th:replace="~{common/_admin_footer}"></th:block>

  </body>
</html>
