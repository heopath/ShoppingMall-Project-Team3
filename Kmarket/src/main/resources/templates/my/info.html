<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <th:block th:replace="~{common/_site_head :: head('마이페이지 나의설정')}"></th:block>
    <link rel="stylesheet" href="./../css/main.css" />
    <link rel="stylesheet" href="./../css/my/common.css" />
    <link rel="stylesheet" href="./../css/my/info.css" />
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // ==========================
        // 이메일 수정
        // ==========================
        const emailEditBtn = document.querySelector(".email-edit-btn");

        emailEditBtn.addEventListener("click", function () {

          document.querySelectorAll(".email-input").forEach(input => {
            input.disabled = false;
          });

          document.querySelector(".email-select").disabled = false;

        });


        // 이메일 선택
        document.querySelector(".email-select").addEventListener("change", function () {

          const domainInput = document.querySelectorAll(".email-input")[1];

          if (this.value === "직접입력") {

            domainInput.disabled = false;
            domainInput.value = "";
            domainInput.focus();

          } else {

            domainInput.disabled = true;
            domainInput.value = this.value;

          }

        });


        // ==========================
        // 휴대폰 수정
        // ==========================
        document.querySelector(".phone-edit-btn").addEventListener("click", function () {

          document.querySelectorAll(".phone-input").forEach(input => {
            input.disabled = false;
          });

        });


        // ==========================
        // 회원정보 수정
        // ==========================
        document.querySelector(".setting-submit-btn").addEventListener("click", async function (e) {

          e.preventDefault();

          const emailId = document.querySelectorAll(".email-input")[0].value.trim();
          const emailDomain = document.querySelectorAll(".email-input")[1].value.trim();

          const hp1 = document.querySelectorAll(".phone-input")[0].value.trim();
          const hp2 = document.querySelectorAll(".phone-input")[1].value.trim();
          const hp3 = document.querySelectorAll(".phone-input")[2].value.trim();

          const data = {

            email: emailId + "@" + emailDomain,
            hp: hp1 + hp2 + hp3,

            zip: document.querySelector(".postcode").value.trim(),

            addr1: document.querySelectorAll(".address-input")[1].value.trim(),

            addr2: document.querySelectorAll(".address-input")[2].value.trim()

          };

          const response = await fetch("/my/setting", {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify(data)

          });

          if (response.ok) {

            alert("회원정보가 수정되었습니다.");
            location.reload();

          } else {

            alert("회원정보 수정에 실패했습니다.");

          }

        });

      });
    </script>
  </head>
  <body>
  <th:block th:replace="~{common/_main_header}"></th:block>


  <main class="main-layout">
      <div class="mypage-layout">
        <aside class="mypage-sidebar">
          <h3>마이페이지</h3>

          <ul>
            <li><a th:href="@{/my/order}">전체주문내역</a></li>
            <li><a th:href="@{/my/point}">포인트내역</a></li>
            <li><a th:href="@{/my/coupon}">쿠폰</a></li>
            <li><a th:href="@{/my/review}">나의리뷰</a></li>
            <li><a th:href="@{/my/qna}">문의하기</a></li>
            <li class="active"><a th:href="@{/my/info}">나의설정</a></li>
          </ul>
        </aside>

        <section class="mypage-content">
          <div class="mypage-summary">
            <div class="summary-card">
              <strong>주문</strong>
              <span>2</span>
            </div>

            <div class="summary-card">
              <strong>쿠폰</strong>
              <span>1</span>
            </div>

            <div class="summary-card">
              <strong>포인트</strong>
              <span>1,000</span>
            </div>

            <div class="summary-card">
              <strong>문의</strong>
              <span>1</span>
            </div>
          </div>

          <div class="mypage-banner">
            <img src="/images/my/myBanner.png" alt="myBanner" style="width: 100%">
          </div>


          <section class="mypage-section">
            <div class="section-header">
              <h3>나의 설정</h3>
            </div>

            <form class="setting-form">
              <table class="setting-table">
                <tbody>
                  <tr>
                    <th>사용자 ID</th>
                    <td th:text="${member.maskedMemberId}"></td>
                  </tr>

                  <tr>
                    <th>비밀번호</th>
                    <td>
                      <a th:href="@{/member/find/changePassword}" class="setting-btn password-change-btn">
                        비밀번호 수정
                      </a>
                    </td>
                  </tr>

                  <tr>
                    <th>이름</th>
                    <td th:text="${member.maskedName}"></td>
                  </tr>

                  <tr>
                    <th>생년월일</th>
                    <td th:text="${#temporals.format(member.birth,'yyyy년 MM월 dd일')}"></td>
                  </tr>

                  <tr>
                    <th>Email</th>

                    <td>
                      <div class="email-wrap">
                        <input type="text"
                               th:value="${#strings.arraySplit(member.email,'@')[0]}"
                               class="email-input"
                               disabled>

                        <span>@</span>

                        <input type="text"
                               th:value="${#strings.arraySplit(member.email,'@')[1]}"
                               class="email-input"
                               disabled>

                        <select disabled class="email-select">
                          <option>직접입력</option>
                          <option>naver.com</option>
                          <option>gmail.com</option>
                          <option>daum.net</option>
                        </select>

                        <button
                          type="button"
                          class="setting-btn email-edit-btn"
                        >
                          수정하기
                        </button>
                      </div>
                    </td>
                  </tr>

                  <tr>
                    <th>휴대폰</th>

                    <td>
                      <div class="phone-wrap">
                        <input type="text"
                               th:value="${#strings.substring(member.hp,0,3)}"
                               class="phone-input"
                               disabled>

                        <input type="text"
                               th:value="${#strings.substring(member.hp,4,8)}"
                               class="phone-input"
                               disabled>

                        <input type="text"
                               th:value="${#strings.substring(member.hp,9,13)}"
                               class="phone-input"
                               disabled>

                        <button
                          type="button"
                          class="setting-btn phone-edit-btn"
                        >
                          수정하기
                        </button>
                      </div>
                    </td>
                  </tr>

                  <tr>
                    <th>주소</th>

                    <td>
                      <div class="address-wrap">
                        <div class="address-row">

                          <input th:value="${member.zip}" type="text"  class="address-input postcode">

                          <button type="button" class="setting-btn">
                            주소검색
                          </button>
                        </div>

                        <input th:value="${member.addr1}"  type="text"   class="address-input">
                        <input th:value="${member.addr2}"   type="text"  class="address-input">

                      </div>
                    </td>
                  </tr>

                  <tr>
                    <th>탈퇴</th>

                    <td>
                      <a
                        href="#"
                        class="withdraw-btn"
                      >
                        탈퇴하기
                      </a>
                    </td>
                  </tr>
                </tbody>
              </table>

              <div class="setting-submit-area">
                <a href="#" class="setting-submit-btn"> 수정하기 </a>
              </div>
            </form>
          </section>
        </section>
      </div>
    </main>

  <th:block th:replace="~{common/_admin_footer}"></th:block>

  </body>
</html>
