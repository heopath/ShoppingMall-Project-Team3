<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <th:block th:replace="~{common/_site_head :: head('마이페이지 문의하기')}"></th:block>
  <link rel="stylesheet" href="./../css/main.css" />
  <link rel="stylesheet" href="./../css/my/common.css" />
  <link rel="stylesheet" href="./../css/my/qna.css" />
  <link
          rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
</head>
<body>
<th:block th:replace="~{common/_main_header}"></th:block>


<main class="main-layout">
  <div class="mypage-layout">
    <aside class="mypage-sidebar">
      <h3>마이페이지</h3>

      <ul>
        <li><a th:href="@{/my/order}">전체주문내역</a></li>
        <li><a th:href="@{/my/point}">포인트내역</a></li>
        <li><a th:href="@{/my/coupon}">쿠폰</a></li>
        <li><a th:href="@{/my/review}">나의리뷰</a></li>
        <li  class="active"><a th:href="@{/my/qna}">문의하기</a></li>
        <li><a th:href="@{/my/info}">나의설정</a></li>
      </ul>
    </aside>

    <section class="mypage-content">
      <div class="mypage-summary">
        <div class="summary-card">
          <strong>주문</strong>
          <span th:text="${summary.orderCount}">0</span>
        </div>
        <div class="summary-card">
          <strong>쿠폰</strong>
          <span th:text="${summary.couponCount}">0</span>
        </div>
        <div class="summary-card">
          <strong>포인트</strong>
          <span th:text="${#numbers.formatInteger(summary.point ?: 0, 3, 'COMMA')}">0</span>
        </div>
        <div class="summary-card">
          <strong>문의</strong>
          <span th:text="${summary.qnaCount}">0</span>
        </div>
      </div>

      <div class="mypage-banner">
        <img src="/images/my/myBanner.png" alt="myBanner" style="width: 100%">
      </div>

      <section class="mypage-section">
        <div class="section-header">
          <h3>문의하기</h3>
        </div>

        <!-- 문의하기 테이블 -->
        <table class="inquiry-table">
          <thead>
          <tr>
            <th>번호</th>
            <th>문의채널</th>
            <th>문의유형</th>
            <th>제목</th>
            <th>작성일</th>
            <th>상태</th>
          </tr>
          </thead>

          <tbody>
          <tr th:each="qna : ${qnaList}" th:onclick="|openQnaModal(${qna.qnaNo})|"
              style="cursor: pointer;">

            <td th:text="${qna.qnaNo}"></td>

            <td>고객센터</td>

            <td th:text="${qna.parentCateName + ' / ' + qna.cateName}"></td>

            <td th:text="${qna.title}"></td>

            <td th:text="${#temporals.format(qna.regDate,'yyyy-MM-dd')}"></td>

            <td th:text="${qna.status}"
                th:style="${qna.status == '답변완료'} ? 'color: #3fbf3f;' : 'color: #999;'">
            </td>

          </tr>

          <tr th:if="${#lists.isEmpty(qnaList)}">
            <td colspan="6">문의내역이 없습니다.</td>
          </tr>

          </tbody>
        </table>

        <!-- 페이징 -->
        <div class="pagination" th:if="${not #lists.isEmpty(qnaList)}">
          <a th:if="${page.startPage > 1}"
             th:href="@{/my/qna(pg=${page.startPage - 1})}"
             class="page-btn"><i class="bi bi-chevron-left"></i></a>

          <th:block th:each="i : ${#numbers.sequence(page.startPage, page.endPage)}">
            <a th:href="@{/my/qna(pg=${i})}"
               th:text="${i}"
               th:classappend="${i == page.currentPage} ? 'active'"></a>
          </th:block>

          <a th:if="${page.endPage < page.lastPage}"
             th:href="@{/my/qna(pg=${page.endPage + 1})}"
             class="page-btn"><i class="bi bi-chevron-right"></i></a>
        </div>
      </section>
    </section>
  </div>
</main>

<th:block th:replace="~{common/_admin_footer}"></th:block>

<!-- 문의 상세 모달 -->
<!-- 문의 상세 모달 -->
<div class="modal-overlay" id="qnaModal" style="display:none;">

  <div class="modal">

    <div class="modal-header">
      <h3>문의 상세</h3>
      <button type="button" class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="modal-body">

      <!-- 기본 정보 -->
      <div class="qna-info">

        <div class="info-row row-status">
          <span class="label">처리상태</span>

          <div class="info-value">
            <span id="modalStatus" class="status"></span>
          </div>
        </div>

        <div class="info-row">
          <span class="label">문의유형</span>
          <span id="modalCategory"></span>
        </div>

        <div class="info-row">
          <span class="label">작성일</span>
          <span id="modalRegDate"></span>
        </div>

      </div>

      <!-- 제목 -->
      <div class="modal-section">
        <h4>제목</h4>
        <div class="modal-box" id="modalTitle"></div>
      </div>

      <!-- 문의내용 -->
      <div class="modal-section">
        <h4>문의내용</h4>
        <div class="modal-box content-box" id="modalContent"></div>
      </div>

      <!-- 답변 -->
      <div class="modal-section">

        <div class="section-header">
          <h4>답변</h4>
          <span class="answer-date" id="modalAnswerDate"></span>
        </div>

        <div class="modal-box answer-box" id="modalAnswer"></div>

      </div>

    </div>



  </div>

</div>

<script>
  function openQnaModal(qnaNo) {

    fetch("/my/qna/detail?qnaNo=" + qnaNo)
            .then(res => res.json())
            .then(qna => {

              document.getElementById("modalCategory").textContent =
                      qna.parentCateName + " > " + qna.cateName;

              document.getElementById("modalRegDate").textContent = qna.regDate.split('T')[0];

              document.getElementById("modalTitle").textContent = qna.title;

              document.getElementById("modalContent").innerHTML =
                      qna.content.replace(/\n/g,"<br>");

              document.getElementById("modalAnswer").innerHTML =
                      qna.answer
                              ? qna.answer.replace(/\n/g,"<br>")
                              : "아직 답변이 등록되지 않았습니다.";

              const status = document.getElementById("modalStatus");
              status.textContent = qna.status;

              status.className =
                      "status " + (qna.status === "답변완료" ? "complete" : "wait");

              document.getElementById("qnaModal").style.display = "flex";
            });
  }

  function closeModal() {
    document.getElementById("qnaModal").style.display = "none";
  }

  // 바깥 클릭 시 닫기
  document.getElementById("qnaModal").addEventListener("click", function (e) {
    if (e.target === this) {
      closeModal();
    }
  });
</script>

</body>
</html>
