<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지 포인트내역</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/my/common.css" />
    <link rel="stylesheet" href="../css/my/point.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="../js/my/searchDate.js"></script>
  </head>
  <body>
  <th:block th:replace="~{common/_main_header}"></th:block>


  <main class="main-layout">
      <div class="mypage-layout">
        <aside class="mypage-sidebar">
          <h3>마이페이지</h3>

          <ul>
            <li><a href="#">전체주문내역</a></li>
            <li class="active"><a href="#">포인트내역</a></li>
            <li><a href="#">쿠폰</a></li>
            <li><a href="#">나의리뷰</a></li>
            <li><a href="#">문의하기</a></li>
            <li><a href="#">나의설정</a></li>
          </ul>
        </aside>

        <section class="mypage-content">
          <div class="mypage-summary">
            <div class="summary-card">
              <strong>주문</strong>
              <span>2</span>
            </div>

            <div class="summary-card">
              <strong>쿠폰</strong>
              <span>1</span>
            </div>

            <div class="summary-card">
              <strong>포인트</strong>
              <span>1,000</span>
            </div>

            <div class="summary-card">
              <strong>문의</strong>
              <span>1</span>
            </div>
          </div>

          <div class="mypage-banner">810 × 86 배너 광고</div>

          <!-- 배너 -->
          <!-- <div class="mypage-banner">
            <img src="../../images/mypage/banner.jpg" alt="광고 배너" />
          </div> -->

          <section class="mypage-section">
            <div class="section-header">
              <h3>포인트 내역</h3>
            </div>

            <!-- 기간 조회 -->
            <div class="period-search-wrap">
              <div class="period-search-title">기간별조회</div>

              <div class="period-search-content">
                <!-- 단기조회 -->
                <div class="period-btn-group quick-period">
                  <button type="button">1주일</button>
                  <button type="button">15일</button>
                  <button type="button">1개월</button>
                </div>

                <!-- 최근 5개월 -->
                <div class="period-btn-group month-period">
                  <button type="button">10월</button>
                  <button type="button">9월</button>
                  <button type="button">8월</button>
                  <button type="button">7월</button>
                  <button type="button">6월</button>
                </div>

                <!-- 직접조회 -->
                <div class="period-date-group">
                  <input type="date" id="startDate" />

                  <span>~</span>

                  <input type="date" id="endDate" />

                  <button type="button" class="period-search-btn">조회</button>
                </div>
              </div>
            </div>

            <!-- 포인트 테이블 -->
            <table class="point-table">
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>구분</th>
                  <th>주문번호</th>
                  <th>적립금액</th>
                  <th>비고</th>
                  <th>유효기간</th>
                </tr>
              </thead>

              <tbody>
                <tr>
                  <td>2026-06-18</td>
                  <td>적립</td>
                  <td>20220618001</td>
                  <td class="point-plus">340</td>
                  <td>상품 구매적립</td>
                  <td>2027-06-18</td>
                </tr>

                <tr>
                  <td>2026-06-15</td>
                  <td>적립</td>
                  <td>20220615001</td>
                  <td class="point-plus">120</td>
                  <td>상품 구매적립</td>
                  <td>2027-06-15</td>
                </tr>
              </tbody>
            </table>

            <!-- 페이징 -->
            <div class="pagination">
              <a href="#" class="page-btn"
                ><i class="bi bi-chevron-left"></i
              ></a>

              <a href="#" class="active">1</a>
              <a href="#">2</a>
              <a href="#">3</a>
              <a href="#">4</a>
              <a href="#">5</a>

              <a href="#" class="page-btn"
                ><i class="bi bi-chevron-right"></i
              ></a>
            </div>
          </section>
        </section>
      </div>
    </main>

  <th:block th:replace="~{common/_admin_footer}"></th:block>

  </body>
</html>
