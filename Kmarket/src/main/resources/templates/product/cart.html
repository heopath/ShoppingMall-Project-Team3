<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-Market 장바구니</title>

    <link rel="stylesheet" href="../css/product/common.css" />
    <link rel="stylesheet" href="../css/product/cart.css" />
</head>

<body id="top">
<!-- 최상단 광고 배너, 헤더, nav include -->
<th:block th:replace="~{common/_main_header}"></th:block>

<div class="page-layout">
    <!-- Aside : index와 동일 -->
    <th:block th:replace="~{common/_main_aside}"></th:block>

    <!-- Cart Content -->
    <main class="content-area">

        <section class="cart-page">
            <div class="page-title">
                <h1>장바구니</h1>
            </div>

            <div class="cart-table-wrap">
                <div class="cart-table-head">
                    <label class="check-wrap">
                        <input type="checkbox" id="checkAll" />
                        <span></span>
                    </label>

                    <span>상품명</span>
                    <span>수량</span>
                    <span>판매가</span>
                    <span>할인</span>
                    <span>포인트</span>
                    <span>배송비</span>
                    <span>총합</span>
                </div>

                <div class="cart-list" id="cartList"></div>
            </div>

            <div class="cart-bottom">
                <button type="button" class="delete-btn" id="deleteSelected">선택삭제</button>

                <aside class="cart-summary">
                    <h2>전체합계</h2>

                    <dl>
                        <div>
                            <dt>상품수</dt>
                            <dd id="summaryCount">0</dd>
                        </div>

                        <div>
                            <dt>상품금액</dt>
                            <dd id="summaryProductPrice">0원</dd>
                        </div>

                        <div>
                            <dt>할인금액</dt>
                            <dd id="summaryDiscount">0원</dd>
                        </div>

                        <div>
                            <dt>배송비</dt>
                            <dd id="summaryDelivery">0원</dd>
                        </div>

                        <div class="total-row">
                            <dt>결제예정 금액</dt>
                            <dd id="summaryTotal">0원</dd>
                        </div>

                        <div>
                            <dt>적립 포인트</dt>
                            <dd id="summaryPoint">0</dd>
                        </div>
                    </dl>

                    <button type="button" class="order-btn" id="orderBtn">주문하기</button>
                </aside>
            </div>
        </section>
    </main>
</div>

<!-- Footer -->
<th:block th:replace="~{common/_main_footer}"></th:block>

<a href="#top" class="top-btn">
    <img src="../images/main/top.png" alt="위로 이동" />
</a>

<script th:src="@{/js/product/cart.js}"></script>
</body>
</html>
