<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <th:block th:replace="~{common/_site_head :: head('주문하기')}"></th:block>

    <link rel="stylesheet" th:href="@{/css/product/common.css}" />
    <link rel="stylesheet" th:href="@{/css/product/order.css}" />
</head>

<body id="top">
<!-- 최상단 광고 배너, 헤더, nav include -->
<th:block th:replace="~{common/_main_header}"></th:block>

<div class="page-layout">
    <!-- Aside : index와 동일 -->
    <th:block th:replace="~{common/_main_aside}"></th:block>

    <!-- 주문 내용 -->
    <main class="content-area">
        <div class="breadcrumb">HOME <span>›</span> 장바구니 <span>›</span> 주문하기</div>

        <section class="order-page">

            <!-- 주문 상품 -->
            <section class="order-product-section">
                <div class="order-table-head">
                    <span>상품명</span>
                    <span>수량</span>
                    <span>판매가</span>
                    <span>할인</span>
                    <span>포인트</span>
                    <span>배송비</span>
                    <span>총합</span>
                </div>

                <div th:if="${orderItems == null or #lists.isEmpty(orderItems)}"
                     class="empty-order">
                    주문할 상품이 없습니다.
                </div>

                <div th:each="item : ${orderItems}"
                     th:with="
                        price=${item.price != null ? item.price : 0},
                        discountRate=${item.discountRate != null ? item.discountRate : 0},
                        quantity=${item.quantity != null ? item.quantity : 0},
                        deliveryFee=${item.deliveryFee != null ? item.deliveryFee : 0},
                        discountPrice=${price * discountRate / 100},
                        salePrice=${price - discountPrice},
                        itemTotal=${salePrice * quantity + deliveryFee}
                     "
                     class="order-product-row"
                     th:data-cart-no="${item.cartNo}"
                     th:data-product-no="${item.productNo}"
                     th:data-product-name="${item.productName}"
                     th:data-seller-no="${item.sellerNo}"
                     th:data-price="${price}"
                     th:data-discount-rate="${discountRate}"
                     th:data-quantity="${quantity}"
                     th:data-delivery-fee="${deliveryFee}"
                     th:data-point="${item.point != null ? item.point : 0}">


                    <a th:href="@{/product/view(productNo=${item.productNo})}"
                       class="order-product-info">

                    <span class="order-product-thumb">
                        <img th:if="${item.imagePath != null and item.imagePath != ''}"
                             th:src="@{${item.imagePath}}"
                             th:alt="${item.productName}" />

                        <svg th:if="${item.imagePath == null or item.imagePath == ''}"
                             viewBox="0 0 24 24"
                             fill="#ccc">
                            <path d="M21 19V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                        </svg>
                    </span>

                        <span class="order-product-text">
                        <b th:text="${item.productName}">상품명</b>

                        <em th:if="${item.basicDesc != null and item.basicDesc != ''}"
                            th:text="${item.basicDesc}">
                            상품설명
                        </em>

                        <em th:if="${item.optionText != null and item.optionText != ''}"
                            th:text="'옵션 : ' + ${item.optionText}">
                            옵션
                        </em>
                    </span>
                    </a>

                    <span th:text="${quantity}">1</span>

                    <span th:text="${#numbers.formatInteger(price, 1, 'COMMA')} + '원'">
                        0원
                    </span>

                    <span class="discount-text"
                          th:text="${discountRate} + '%'">
                        0%
                    </span>

                    <span th:text="${#numbers.formatInteger(item.point != null ? item.point * quantity : 0, 1, 'COMMA')}">
                        0
                    </span>

                    <span th:text="${deliveryFee == 0 ? '무료배송' : #numbers.formatInteger(deliveryFee, 1, 'COMMA') + '원'}">
                        무료배송
                    </span>

                    <strong th:text="${#numbers.formatInteger(itemTotal, 1, 'COMMA')} + '원'">
                        0원
                    </strong>
                </div>
            </section>

            <input type="hidden"
                   id="memberGrade"
                   th:value="${loginMember.grade}" />
            <input type="hidden"
                   id="availablePoint"
                   th:value="${discountInfo.availablePoint}" />

            <div class="order-main-grid">
                <!-- 배송 정보 -->
                <div class="order-form-area">
                    <section class="form-section">
                        <h2>배송정보</h2>

                        <div class="form-table">
                            <div class="form-row">
                                <label for="receiverName">수령자</label>
                                <input
                                        type="text"
                                        id="receiverName"
                                        name="receiverName"
                                        th:value="${loginMember.name}"
                                />
                            </div>

                            <div class="form-row">
                                <label for="receiverHp">휴대폰</label>
                                <input
                                        type="text"
                                        id="receiverHp"
                                        name="receiverHp"
                                        th:value="${loginMember.hp}"
                                />
                            </div>

                            <div class="form-row address-row">
                                <label for="zip">우편번호</label>

                                <div class="address-input-wrap">
                                    <input
                                            type="text"
                                            id="zip"
                                            name="zip"
                                            th:value="${loginMember.zip}"
                                            readonly
                                    />
                                    <button type="button" class="address-search-btn" onclick="postcode()">검색</button>
                                </div>
                            </div>

                            <div class="form-row">
                                <label for="addr1">기본주소</label>
                                <input
                                        type="text"
                                        id="addr1"
                                        name="addr1"
                                        th:value="${loginMember.addr1}"
                                        readonly
                                />
                            </div>

                            <div class="form-row">
                                <label for="addr2">상세주소</label>
                                <input
                                        type="text"
                                        id="addr2"
                                        name="addr2"
                                        th:value="${loginMember.addr2}"
                                />
                            </div>

                            <div class="form-row">
                                <label for="deliveryRequest">배송요청사항</label>

                                <div class="delivery-request-wrap">
                                    <select id="deliveryRequest" name="deliveryRequest">
                                        <option value="">배송 요청사항을 선택하세요</option>
                                        <option value="문 앞에 놓아주세요.">문 앞에 놓아주세요.</option>
                                        <option value="경비실에 맡겨주세요.">경비실에 맡겨주세요.</option>
                                        <option value="배송 전 연락주세요.">배송 전 연락주세요.</option>
                                        <option value="부재 시 전화 또는 문자주세요.">부재 시 전화 또는 문자주세요.</option>
                                        <option value="직접 수령하겠습니다.">직접 수령하겠습니다.</option>
                                        <option value="direct">직접 입력</option>
                                    </select>

                                    <input
                                            type="text"
                                            id="deliveryRequestDirect"
                                            placeholder="배송 요청사항을 입력하세요."
                                            hidden
                                            disabled
                                    />
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- 할인 정보 -->
                    <section class="form-section discount-section">
                        <h2>할인정보</h2>

                        <div class="discount-box">
                            <div class="discount-row">
                                        <span class="discount-label">
                                            현재포인트 :
                                            <b id="availablePointText"
                                               th:text="${#numbers.formatInteger(discountInfo.availablePoint, 1, 'COMMA')} + '점'">
                                                0점
                                            </b>
                                        </span>

                                <input
                                        type="number"
                                        id="pointInput"
                                        min="0"
                                        th:max="${discountInfo.availablePoint}"
                                        placeholder="사용할 포인트"
                                />

                                <button type="button" class="use-btn" id="pointUseBtn">사용하기</button>
                            </div>

                            <p class="discount-guide">
                                포인트 5,000점 이상이면 결제금액에서 사용할 수 있습니다.
                            </p>

                            <div class="discount-row coupon-row">
                                <span class="discount-label">쿠폰선택</span>

                                <select id="couponSelect">
                                    <option value="0"
                                            data-coupon-type="NONE"
                                            data-seller-no=""
                                            data-benefit-type="NONE"
                                            data-benefit-value="0"
                                            data-min-order="0"
                                            data-max-discount="0">
                                        쿠폰 선택
                                    </option>

                                    <option th:each="coupon : ${discountInfo.coupons}"
                                            th:value="${coupon.couponIssueNo}"
                                            th:data-coupon-type="${coupon.couponType}"
                                            th:data-seller-no="${coupon.sellerNo}"
                                            th:data-benefit-type="${coupon.benefitType}"
                                            th:data-benefit-value="${coupon.benefitValue}"
                                            th:data-min-order="${coupon.minOrderPrice}"
                                            th:data-max-discount="${coupon.maxDiscountPrice}"
                                            th:text="${coupon.couponName}">
                                        쿠폰명
                                    </option>
                                </select>

                                <button type="button" class="use-btn" id="couponUseBtn">사용하기</button>
                            </div>

                            <p id="couponApplyInfo" class="coupon-apply-info"></p>
                        </div>
                    </section>

                    <!-- 결제 방법 -->
                    <section class="form-section payment-section">
                        <h2>결제방법</h2>

                        <div class="payment-list">
                            <label>
                                <input type="radio" name="payment" value="신용카드" checked />
                                <span>신용카드</span>
                            </label>

                            <label>
                                <input type="radio" name="payment" value="체크카드" />
                                <span>체크카드</span>
                            </label>

                            <label>
                                <input type="radio" name="payment" value="계좌이체" />
                                <span>계좌이체</span>
                            </label>

                            <label>
                                <input type="radio" name="payment" value="무통장입금" />
                                <span>무통장입금</span>
                            </label>

                            <label>
                                <input type="radio" name="payment" value="휴대폰결제" />
                                <span>휴대폰결제</span>
                            </label>

                            <label>
                                <input type="radio" name="payment" value="카카오페이" />
                                <span class="kakao-pay-wrap"
                                >카카오페이
                                            <img src="../images/product/ico_kakaopay.gif" alt="카카오페이" />
                                        </span>
                            </label>
                        </div>
                    </section>
                </div>

                <!-- 최종 결제 정보 -->
                <aside class="payment-summary">
                    <h2>최종결제정보</h2>

                    <dl>
                        <div>
                            <dt>상품수</dt>
                            <dd id="summaryCount">0</dd>
                        </div>

                        <div>
                            <dt>상품금액</dt>
                            <dd id="productPrice">0원</dd>
                        </div>

                        <div>
                            <dt>할인금액</dt>
                            <dd id="discountPrice">0원</dd>
                        </div>

                        <div>
                            <dt>배송비</dt>
                            <dd id="deliveryPrice">0원</dd>
                        </div>

                        <div>
                            <dt>쿠폰/포인트 할인</dt>
                            <dd id="extraDiscount">0원</dd>
                        </div>

                        <div class="pay-total-row">
                            <dt>결제주문액</dt>
                            <dd id="payPrice">0원</dd>
                        </div>

                        <div>
                            <dt>적립 포인트</dt>
                            <dd id="earnedPoint">0</dd>
                        </div>
                    </dl>

                    <button type="button" class="payment-btn" id="paymentBtn">결제하기</button>
                </aside>
            </div>
        </section>
    </main>
</div>

<!-- Footer -->
<th:block th:replace="~{common/_main_footer}"></th:block>

<a href="#top" class="top-btn">
    <img src="../images/main/top.png" alt="위로 이동" />
</a>


<!-- 카카오/다음 우편번호 API -->
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<!-- 우편번호 검색 함수 -->
<script th:src="@{/js/postcode.js}"></script>
<script th:src="@{/js/product/order.js}"></script>

</body>
</html>
