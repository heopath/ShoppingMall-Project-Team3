<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-Market 상품목록</title>

    <link rel="stylesheet" th:href="@{/css/product/common.css}" />
    <link rel="stylesheet" th:href="@{/css/product/list.css}" />

</head>

<body id="top">
<!-- 최상단 광고 배너, 헤더, nav include -->
<th:block th:replace="~{common/_main_header}"></th:block>

<!-- Main Layout -->
<div class="page-layout">
    <!-- Aside : index와 동일 -->
    <th:block th:replace="~{common/_main_aside}"></th:block>

    <!-- Product List -->
    <main class="content-area">
        <div class="breadcrumb">
            <a th:href="@{/}">HOME</a>

            <span th:if="${parentCategory != null}">›</span>
            <span th:if="${parentCategory != null}"
                  th:text="${parentCategory.cateName}">
                패션·의류·뷰티
            </span>

            <span>›</span>

            <strong th:text="${currentCategory.cateName}">
                남성의류
            </strong>
        </div>

        <section class="product-list-page">
            <div class="list-title">
                <div class="list-title-left">
                    <span class="category-label">CATEGORY</span>
                    <h1 th:text="${currentCategory.cateName}">
                        남성의류
                    </h1>
                    <p>
                        <span th:text="${currentCategory.cateName}">남성의류</span>
                        카테고리 상품을 확인해보세요.
                    </p>
                </div>

                <div class="product-total">
                    <span>총 상품 수</span>
                    <strong th:text="${pageResponseDTO.total}">0</strong>
                    <em>개</em>
                </div>
            </div>

            <div class="sort-box">
                <strong>상품정렬</strong>

                <div class="sort-links">
                    <a th:href="@{/product/list(cateNo=${pageResponseDTO.pageRequestDTO.cateNo}, sort='sold', page=1)}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'sold'} ? ' active' : ''">
                        판매많은순
                    </a>

                    <a th:href="@{/product/list(cateNo=${pageResponseDTO.pageRequestDTO.cateNo}, sort='lowPrice', page=1)}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'lowPrice'} ? ' active' : ''">
                        낮은가격순
                    </a>

                    <a th:href="@{/product/list(cateNo=${pageResponseDTO.pageRequestDTO.cateNo}, sort='highPrice', page=1)}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'highPrice'} ? ' active' : ''">
                        높은가격순
                    </a>

                    <a th:href="@{/product/list(cateNo=${pageResponseDTO.pageRequestDTO.cateNo}, sort='highRating', page=1)}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'highRating'} ? ' active' : ''">
                        평점높은순
                    </a>

                    <a th:href="@{/product/list(cateNo=${pageResponseDTO.pageRequestDTO.cateNo}, sort='lowRating', page=1)}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'lowRating'} ? ' active' : ''">
                        평점낮은순
                    </a>

                    <a th:href="@{/product/list(cateNo=${pageResponseDTO.pageRequestDTO.cateNo}, sort='recent', page=1)}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'recent'} ? ' active' : ''">
                        최근등록순
                    </a>
                </div>
            </div>

            <div class="product-list" th:if="${!#lists.isEmpty(pageResponseDTO.dtoList)}">

                <article class="product-item"
                         th:each="product : ${pageResponseDTO.dtoList}">

                    <a th:href="@{/product/view(productNo=${product.productNo})}"
                       class="product-thumb">

                        <img th:src="${product.imagePath != null ? product.imagePath : '/images/common/no-image.png'}"
                             th:alt="${product.productName}" />

                    </a>

                    <div class="product-info">

                        <a th:href="@{/product/view(productNo=${product.productNo})}"
                           class="product-name"
                           th:text="${product.productName}">
                            상품명
                        </a>

                        <p class="product-desc"
                           th:text="${product.basicDesc}">
                            상품 설명
                        </p>

                    </div>

                    <div class="product-price">

                        <del th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + '원'">
                            30,000원
                        </del>

                        <div class="list-price-row">
                            <strong class="list-discount"
                                    th:text="${product.discountRate} + '%'">
                                10%
                            </strong>

                            <strong class="list-price"
                                    th:text="${#numbers.formatInteger(product.salePrice, 3, 'COMMA')} + '원'">
                                27,000원
                            </strong>
                        </div>

                        <span class="delivery"
                              th:classappend="${product.deliveryFee == 0 ? ' free' : ' paid'}"
                              th:text="${product.deliveryFee == 0
                                ? '무료배송'
                                : '배송비 ' + #numbers.formatInteger(product.deliveryFee, 3, 'COMMA') + '원'}">
                            무료배송
                        </span>
                    </div>

                    <div class="product-seller">

                        <div class="seller-line">
                            <span class="seller-icon">🏠</span>

                            <span class="seller-name"
                                  th:text="${product.sellerName}">
                                판매자명
                            </span>
                        </div>
                        <div class="seller-line seller-badge-line">
                            <span class="seller-badge"
                                  th:classappend="${' badge-' + #strings.toLowerCase(product.sellerBadgeCode)}"
                                  th:text="${product.sellerBadgeName}">
                                일반판매자
                            </span>
                        </div>

                        <div class="seller-line">
                            <span class="seller-label"
                                  th:text="'리뷰 ' + ${product.reviewCount} + '건'">
                                리뷰 0건
                            </span>
                        </div>

                        <div class="seller-line review-line">
                            <span class="seller-label">상품평</span>

                            <span class="rating" th:if="${product.reviewCount > 0}">
                            <span class="stars"
                                  th:style="'--rating: ' + ${product.ratingPercent} + '%'">
                            </span>

                            <b th:text="${#numbers.formatDecimal(product.avgRating, 1, 1)}">
                                0.0
                            </b>
                        </span>

                        <span class="no-review" th:unless="${product.reviewCount > 0}">
                            리뷰없음
                        </span>
                        </div>

                    </div>

                </article>

            </div>

            <div class="empty-product"
                 th:if="${#lists.isEmpty(pageResponseDTO.dtoList)}">

                해당 카테고리에 등록된 상품이 없습니다.

            </div>

            <nav class="pagination"
                 aria-label="상품 목록 페이지 이동"
                 th:if="${pageResponseDTO.total > 0}">

                <!-- 첫 페이지 -->
                <a th:href="@{/product/list(
                    cateNo=${pageResponseDTO.pageRequestDTO.cateNo},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=1
                )}"
                   class="page-arrow"
                   aria-label="첫 페이지">
                    «
                </a>

                <!-- 이전 페이지 묶음 -->
                <a th:if="${pageResponseDTO.prev}"
                   th:href="@{/product/list(
                    cateNo=${pageResponseDTO.pageRequestDTO.cateNo},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=${pageResponseDTO.startNo - 1}
                )}"
                   class="page-arrow"
                   aria-label="이전 페이지">
                    ‹
                </a>

                <!-- 현재가 첫 페이지 묶음이면 이전 버튼 자리 유지용 -->
                <span th:unless="${pageResponseDTO.prev}"
                      class="page-arrow disabled">
                    ‹
                </span>

                <!-- 페이지 번호 -->
                <a th:each="num : ${#numbers.sequence(pageResponseDTO.startNo, pageResponseDTO.endNo)}"
                   th:href="@{/product/list(
                    cateNo=${pageResponseDTO.pageRequestDTO.cateNo},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=${num}
                )}"
                   th:text="${num}"
                   th:classappend="${pageResponseDTO.pageRequestDTO.page == num} ? ' active' : ''">
                    1
                </a>

                <!-- 다음 페이지 묶음 -->
                <a th:if="${pageResponseDTO.next}"
                   th:href="@{/product/list(
                    cateNo=${pageResponseDTO.pageRequestDTO.cateNo},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=${pageResponseDTO.endNo + 1}
                )}"
                   class="page-arrow"
                   aria-label="다음 페이지">
                    ›
                </a>

                <!-- 마지막 페이지 묶음이면 다음 버튼 자리 유지용 -->
                <span th:unless="${pageResponseDTO.next}"
                      class="page-arrow disabled">
                    ›
                </span>

                <!-- 마지막 페이지 -->
                <a th:href="@{/product/list(
                    cateNo=${pageResponseDTO.pageRequestDTO.cateNo},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=${pageResponseDTO.lastPage}
                )}"
                   class="page-arrow"
                   aria-label="마지막 페이지">
                    »
                </a>

            </nav>
        </section>
    </main>
</div>

<!-- Footer -->
<th:block th:replace="~{common/_main_footer}"></th:block>

<a href="#top" class="top-btn">
    <img src="../images/main/top.png" alt="위로 이동" />
</a>

<script>

    // 카테고리 눌렀을때 반응
    const items = document.querySelectorAll(".category-item");

    items.forEach(function (item) {
        const title = item.querySelector(".category-title");
        const sub = item.querySelector(".sub-category");

        if (!title || !sub) {
            return;
        }

        title.addEventListener("click", function () {
            item.classList.toggle("active");
        });
    });
</script>
</body>
</html>
