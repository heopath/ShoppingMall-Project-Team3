<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <th:block th:replace="~{common/_site_head :: head('상품검색')}"></th:block>

    <link rel="stylesheet" th:href="@{/css/product/common.css}" />
    <link rel="stylesheet" th:href="@{/css/product/search.css}" />
</head>

<body id="top">
<!-- 최상단 광고 배너, 헤더, nav include -->
<th:block th:replace="~{common/_main_header}"></th:block>

<div class="page-layout">
    <!-- Aside -->
    <th:block th:replace="~{common/_main_aside}"></th:block>

    <!-- Search Content -->
    <main class="content-area">
        <div class="breadcrumb">
            <a th:href="@{/}">HOME</a>
            <span>›</span>
            <strong>상품검색</strong>
            <span>›</span>
            <strong>검색결과</strong>
        </div>

        <section class="search-page">
            <div class="page-title">
                <h1>상품검색결과</h1>
            </div>

            <!-- 검색 결과 제목 -->
            <div class="result-title">
                <strong>
                    <span th:text="${keyword}">검색어</span>
                    검색결과
                </strong>

                <span>
                    총
                    <b th:text="${pageResponseDTO.total}">0</b>
                    건
                </span>
            </div>

            <!-- 상세 검색 -->
            <section class="detail-search">
                <div class="detail-search-title">
                    <div>
                        <span class="search-title-icon">⌕</span>
                        <strong>상세 검색</strong>
                    </div>

                    <span>원하는 조건으로 상품을 찾아보세요.</span>
                </div>

                <form class="search-form"
                      th:action="@{/product/search}"
                      method="get">

                    <div class="keyword-row">
                        <input type="text"
                               name="keyword"
                               id="detailKeyword"
                               th:value="${keyword}"
                               placeholder="검색어를 입력하세요" />

                        <button type="submit" id="searchBtn">검색</button>
                    </div>

                    <div class="filter-row">
                        <div class="check-filter">
                            <label>
                                <input type="checkbox"
                                       name="searchName"
                                       value="true"
                                       th:checked="${searchName == true}" />
                                <span>상품명</span>
                            </label>

                            <label>
                                <input type="checkbox"
                                       name="searchDesc"
                                       value="true"
                                       th:checked="${searchDesc == true}" />
                                <span>상품설명</span>
                            </label>
                        </div>

                        <div class="price-filter">
                            <span>가격</span>

                            <input type="number"
                                   name="minPrice"
                                   min="0"
                                   th:value="${minPrice}"
                                   placeholder="최소금액" />

                            <span class="price-tilde">~</span>

                            <input type="number"
                                   name="maxPrice"
                                   min="0"
                                   th:value="${maxPrice}"
                                   placeholder="최대금액" />
                        </div>
                    </div>
                </form>
            </section>

            <!-- 정렬 -->
            <div class="sort-box">
                <strong>상품정렬</strong>

                <div class="sort-links">
                    <a th:href="@{/product/search(
                        keyword=${keyword},
                        searchName=${searchName},
                        searchDesc=${searchDesc},
                        minPrice=${minPrice},
                        maxPrice=${maxPrice},
                        sort='sold',
                        page=1
                   )}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'sold'} ? ' active' : ''">
                        판매많은순
                    </a>

                    <a th:href="@{/product/search(
                        keyword=${keyword},
                        searchName=${searchName},
                        searchDesc=${searchDesc},
                        minPrice=${minPrice},
                        maxPrice=${maxPrice},
                        sort='lowPrice',
                        page=1
                   )}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'lowPrice'} ? ' active' : ''">
                        낮은가격순
                    </a>

                    <a th:href="@{/product/search(
                        keyword=${keyword},
                        searchName=${searchName},
                        searchDesc=${searchDesc},
                        minPrice=${minPrice},
                        maxPrice=${maxPrice},
                        sort='highPrice',
                        page=1
                   )}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'highPrice'} ? ' active' : ''">
                        높은가격순
                    </a>

                    <a th:href="@{/product/search(
                        keyword=${keyword},
                        searchName=${searchName},
                        searchDesc=${searchDesc},
                        minPrice=${minPrice},
                        maxPrice=${maxPrice},
                        sort='highRating',
                        page=1
                   )}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'highRating'} ? ' active' : ''">
                        평점높은순
                    </a>

                    <a th:href="@{/product/search(
                        keyword=${keyword},
                        searchName=${searchName},
                        searchDesc=${searchDesc},
                        minPrice=${minPrice},
                        maxPrice=${maxPrice},
                        sort='lowRating',
                        page=1
                   )}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'lowRating'} ? ' active' : ''">
                        평점낮은순
                    </a>

                    <a th:href="@{/product/search(
                        keyword=${keyword},
                        searchName=${searchName},
                        searchDesc=${searchDesc},
                        minPrice=${minPrice},
                        maxPrice=${maxPrice},
                        sort='recent',
                        page=1
                   )}"
                       th:classappend="${pageResponseDTO.pageRequestDTO.sort == 'recent'} ? ' active' : ''">
                        최근등록순
                    </a>
                </div>
            </div>

            <!-- 검색 상품 목록 -->
            <div class="product-list"
                 th:if="${!#lists.isEmpty(pageResponseDTO.dtoList)}">

                <article class="product-item"
                         th:each="product : ${pageResponseDTO.dtoList}"
                         th:classappend="${product.stock <= 0} ? ' sold-out' : ''">

                    <a th:href="@{/product/view(productNo=${product.productNo})}"
                       class="product-thumb">

                        <img th:src="${product.imagePath != null ? product.imagePath : '/images/common/no-image.png'}"
                             th:alt="${product.productName}" />

                        <span class="sold-out-overlay"
                              th:if="${product.stock <= 0}">
                            품절
                        </span>
                    </a>

                    <div class="product-info">
                        <a th:href="@{/product/view(productNo=${product.productNo})}"
                           class="product-name"
                           th:text="${product.productName}">
                            상품명
                        </a>

                        <p class="product-desc"
                           th:text="${product.basicDesc}">
                            상품 설명
                        </p>
                    </div>

                    <div class="product-price">
                        <del th:if="${product.discountRate > 0}"
                             th:text="${#numbers.formatInteger(product.price, 1, 'COMMA')} + '원'">
                            30,000원
                        </del>

                        <div class="list-price-row">
                            <strong class="list-discount"
                                    th:if="${product.discountRate > 0}"
                                    th:text="${product.discountRate} + '%'">
                                10%
                            </strong>

                            <strong class="list-price"
                                    th:text="${#numbers.formatInteger(product.salePrice, 1, 'COMMA')} + '원'">
                                27,000원
                            </strong>
                        </div>

                        <span class="delivery"
                              th:classappend="${product.deliveryFee == 0 ? ' free' : ' paid'}"
                              th:text="${product.deliveryFee == 0
                                ? '무료배송'
                                : '배송비 ' + #numbers.formatInteger(product.deliveryFee, 1, 'COMMA') + '원'}">
                            무료배송
                        </span>
                    </div>

                    <div class="product-seller">
                        <div class="seller-line">
                            <span class="seller-icon">🏠</span>

                            <span class="seller-name"
                                  th:text="${product.sellerName}">
                                판매자명
                            </span>
                        </div>

                        <div class="seller-line seller-badge-line">
                            <span class="seller-badge"
                                  th:classappend="${' badge-' + #strings.toLowerCase(product.sellerBadgeCode)}"
                                  th:text="${product.sellerBadgeName}">
                                일반판매자
                            </span>
                        </div>

                        <div class="seller-line">
                            <span class="seller-label"
                                  th:text="'리뷰 ' + ${product.reviewCount} + '건'">
                                리뷰 0건
                            </span>
                        </div>

                        <div class="seller-line review-line">
                            <span class="seller-label">상품평</span>

                            <span class="rating"
                                  th:if="${product.reviewCount > 0}">

                                <span class="stars"
                                      th:style="'--rating: ' + ${product.ratingPercent} + '%'">
                                </span>

                                <b th:text="${#numbers.formatDecimal(product.avgRating, 1, 1)}">
                                    0.0
                                </b>
                            </span>

                            <span class="no-review"
                                  th:unless="${product.reviewCount > 0}">
                                리뷰없음
                            </span>
                        </div>
                    </div>
                </article>
            </div>

            <!-- 빈 검색 결과 -->
            <div class="empty-result"
                 th:if="${#lists.isEmpty(pageResponseDTO.dtoList)}">
                검색 조건에 맞는 상품이 없습니다.
            </div>

            <!-- Pagination -->
            <nav class="pagination"
                 aria-label="검색 결과 페이지 이동"
                 th:if="${pageResponseDTO.total > 0}">

                <!-- 첫 페이지 -->
                <a th:href="@{/product/search(
                    keyword=${keyword},
                    searchName=${searchName},
                    searchDesc=${searchDesc},
                    minPrice=${minPrice},
                    maxPrice=${maxPrice},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=1
                )}"
                   class="page-arrow"
                   aria-label="첫 페이지">
                    «
                </a>

                <!-- 이전 페이지 묶음 -->
                <a th:if="${pageResponseDTO.prev}"
                   th:href="@{/product/search(
                    keyword=${keyword},
                    searchName=${searchName},
                    searchDesc=${searchDesc},
                    minPrice=${minPrice},
                    maxPrice=${maxPrice},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=${pageResponseDTO.startNo - 1}
                )}"
                   class="page-arrow"
                   aria-label="이전 페이지">
                    ‹
                </a>

                <span th:unless="${pageResponseDTO.prev}"
                      class="page-arrow disabled">
                    ‹
                </span>

                <!-- 페이지 번호 -->
                <a th:each="num : ${#numbers.sequence(pageResponseDTO.startNo, pageResponseDTO.endNo)}"
                   th:href="@{/product/search(
                    keyword=${keyword},
                    searchName=${searchName},
                    searchDesc=${searchDesc},
                    minPrice=${minPrice},
                    maxPrice=${maxPrice},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=${num}
                )}"
                   th:text="${num}"
                   th:classappend="${pageResponseDTO.pageRequestDTO.page == num} ? ' active' : ''">
                    1
                </a>

                <!-- 다음 페이지 묶음 -->
                <a th:if="${pageResponseDTO.next}"
                   th:href="@{/product/search(
                    keyword=${keyword},
                    searchName=${searchName},
                    searchDesc=${searchDesc},
                    minPrice=${minPrice},
                    maxPrice=${maxPrice},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=${pageResponseDTO.endNo + 1}
                )}"
                   class="page-arrow"
                   aria-label="다음 페이지">
                    ›
                </a>

                <span th:unless="${pageResponseDTO.next}"
                      class="page-arrow disabled">
                    ›
                </span>

                <!-- 마지막 페이지 -->
                <a th:href="@{/product/search(
                    keyword=${keyword},
                    searchName=${searchName},
                    searchDesc=${searchDesc},
                    minPrice=${minPrice},
                    maxPrice=${maxPrice},
                    sort=${pageResponseDTO.pageRequestDTO.sort},
                    page=${pageResponseDTO.lastPage}
                )}"
                   class="page-arrow"
                   aria-label="마지막 페이지">
                    »
                </a>
            </nav>
        </section>
    </main>
</div>

<!-- Footer -->
<th:block th:replace="~{common/_main_footer}"></th:block>

<a href="#top" class="top-btn">
    <img th:src="@{/images/main/top.png}" alt="위로 이동" />
</a>

<script>
    // 카테고리 눌렀을 때 2차 카테고리 열기/닫기
    const items = document.querySelectorAll(".category-item");

    items.forEach(function (item) {
        const title = item.querySelector(".category-title");
        const sub = item.querySelector(".sub-category");

        if (!title || !sub) {
            return;
        }

        title.addEventListener("click", function () {
            item.classList.toggle("active");
        });
    });
</script>
</body>
</html>
