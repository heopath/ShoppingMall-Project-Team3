<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>요청을 확인해 주세요 | K-Market</title>
    <link rel="stylesheet" th:href="@{/css/common/error.css}" href="/css/common/error.css" />
</head>
<body>
<div class="error-page">
    <header class="error-header">
        <a class="error-logo" th:href="@{/}" href="/">
            <img th:src="@{/images/main/header_logo.png}" src="/images/main/header_logo.png" alt="K-Market" />
        </a>
    </header>

    <main class="error-content">
        <section class="error-card">
            <span class="error-kicker">잘못된 요청</span>
            <p class="error-code bad-request">400</p>
            <h1>요청 내용을 다시 확인해 주세요</h1>
            <p>
                입력값이 올바르지 않거나 처리할 수 없는 요청입니다.<br />
                이전 페이지에서 내용을 확인한 뒤 다시 시도해 주세요.
            </p>

            <div class="error-actions">
                <a class="error-button primary" th:href="@{/}" href="/">K-Market 홈</a>
                <button class="error-button" type="button" onclick="history.back()">입력 화면으로</button>
            </div>

            <div class="error-help">같은 문제가 반복되면 <a th:href="@{/cs/qna/list}" href="/cs/qna/list">고객센터</a>로 문의해 주세요.</div>
        </section>
    </main>
</div>
</body>
</html>
