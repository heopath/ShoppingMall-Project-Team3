<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서비스 이용이 원활하지 않습니다 | K-Market</title>
    <link rel="stylesheet" th:href="@{/css/common/error.css}" href="/css/common/error.css" />
</head>
<body>
<div class="error-page">
    <header class="error-header">
        <a class="error-logo" th:href="@{/}" href="/">
            <img th:src="@{/images/main/header_logo.png}"
                 src="/images/main/header_logo.png"
                 alt="K-Market" />
        </a>
    </header>

    <main class="error-content">
        <section class="error-card">
            <p class="error-code">500</p>
            <h1>잠시 서비스 이용이 원활하지 않아요</h1>
            <p>
                요청을 처리하는 중 일시적인 문제가 발생했습니다.<br />
                잠시 후 다시 시도해 주세요.
            </p>

            <div class="error-actions">
                <a class="error-button primary" th:href="@{/}" href="/">K-Market 홈</a>
                <button class="error-button" type="button" onclick="location.reload()">다시 시도</button>
            </div>

            <div class="error-help">문제가 계속되면 고객센터에 문의해 주세요.</div>
        </section>
    </main>
</div>
</body>
</html>
