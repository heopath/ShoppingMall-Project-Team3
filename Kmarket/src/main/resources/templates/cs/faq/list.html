<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자주묻는질문 목록</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/cs/common.css" />
  <link rel="stylesheet" href="../../css/cs/faq/list.css" />
  <script>
    document.addEventListener("DOMContentLoaded", function () {

      document.querySelectorAll(".faq-group").forEach(function (group) {

        const items = group.querySelectorAll(".faq-list li");
        const btn = group.querySelector(".more-btn");

        // 처음에는 3개만 보이기
        items.forEach(function(item, index){
          if(index >= 3){
            item.style.display = "none";
          }
        });

        // 3개 이하라면 버튼 숨김
        if(items.length <= 3){
          btn.style.display = "none";
          return;
        }

        btn.addEventListener("click", function(){

          const isOpen = btn.classList.contains("open");

          items.forEach(function(item, index){

            if(index >= 3){
              item.style.display = isOpen ? "none" : "list-item";
            }

          });

          btn.classList.toggle("open");
          btn.textContent = isOpen ? "더보기" : "간단히 보기";

        });

      });

    });
  </script>
</head>
<body>
<th:block th:replace="~{common/_main_header}"></th:block>


<main class="main-layout">
  <div class="breadcrumb">
    <a th:href="@{/cs/index}">홈</a>
    <span>></span>
    <span>자주묻는질문</span>
  </div>

  <div class="cs-layout">
    <!-- 사이드 -->
    <aside class="cs-sidebar">
      <h3>자주묻는 질문</h3>

      <ul>
        <li th:classappend="${parentNo == 1} ? 'active'">
          <a th:href="@{/cs/faq/list(parentNo=1)}">회원</a>
        </li>
        <li th:classappend="${parentNo == 2} ? 'active'">
          <a th:href="@{/cs/faq/list(parentNo=2)}">주문·결제</a>
        </li>
        <li th:classappend="${parentNo == 3} ? 'active'">
          <a th:href="@{/cs/faq/list(parentNo=3)}">배송</a>
        </li>
        <li th:classappend="${parentNo == 4} ? 'active'">
          <a th:href="@{/cs/faq/list(parentNo=4)}">취소·반품·교환</a>
        </li>
        <li th:classappend="${parentNo == 5} ? 'active'">
          <a th:href="@{/cs/faq/list(parentNo=5)}">상품</a>
        </li>
      </ul>
    </aside>

    <!-- 본문 -->
    <section class="cs-content">
      <div class="content-header">
        <h2 th:switch="${parentNo}">
          <span th:case="1">회원</span>
          <span th:case="2">주문·결제</span>
          <span th:case="3">배송</span>
          <span th:case="4">취소·반품·교환</span>
          <span th:case="5">상품</span>
          <span th:case="*">회원</span>
        </h2>

        <p th:switch="${parentNo}">
          <span th:case="1">회원 관련 자주묻는 질문 입니다.</span>
          <span th:case="2">주문·결제 관련 자주묻는 질문 입니다.</span>
          <span th:case="3">배송 관련 자주묻는 질문 입니다.</span>
          <span th:case="4">취소·반품·교환 관련 자주묻는 질문 입니다.</span>
          <span th:case="5">상품 관련 자주묻는 질문 입니다.</span>
          <span th:case="*">자주묻는 질문 입니다.</span>
        </p>
      </div>

      <div class="faq-group" th:each="entry : ${faqMap}">
        <h3 class="faq-title" th:text="${entry.key}">소카테고리명</h3>
        <ul class="faq-list">
          <li th:each="faq : ${entry.value}">
            <th:block th:if="${faq != null}">
              <a th:href="@{/cs/faq/view(faqNo=${faq.faqNo})}">
                <span class="q-mark">Q</span>
                <span th:text="${faq.title}">제목</span>
              </a>
            </th:block>
          </li>
        </ul>
        <button class="more-btn">더보기</button>
      </div>

    </section>
  </div>
</main>

<th:block th:replace="~{common/_main_footer}"></th:block>

</body>
</html>
