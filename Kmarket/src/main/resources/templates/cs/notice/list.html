<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <th:block th:replace="~{common/_site_head :: head('공지사항 목록')}"></th:block>
    <link rel="stylesheet" href="../../css/main.css"/>
    <link rel="stylesheet" href="../../css/cs/common.css"/>
    <link rel="stylesheet" href="../../css/cs/notice/list.css"/>
    <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
</head>
<body>
<th:block th:replace="~{common/_main_header}"></th:block>


<main class="main-layout">
    <div class="breadcrumb">
        <a th:href="@{/cs/index}">홈</a>
        <span>></span>
        <span>공지사항</span>
    </div>
    <div class="cs-layout">
        <!-- 사이드 메뉴 -->
        <aside class="cs-sidebar">
            <h3>공지사항</h3>
            <ul>
                <li th:classappend="${noticeType == null or noticeType == ''} ? 'active'">
                    <a th:href="@{/cs/notice/list}">전체</a>
                </li>

                <li th:classappend="${noticeType == '고객서비스'} ? 'active'">
                    <a th:href="@{/cs/notice/list(noticeType='고객서비스')}">고객서비스</a>
                </li>

                <li th:classappend="${noticeType == '안전거래'} ? 'active'">
                    <a th:href="@{/cs/notice/list(noticeType='안전거래')}">안전거래</a>
                </li>

                <li th:classappend="${noticeType == '위해상품'} ? 'active'">
                    <a th:href="@{/cs/notice/list(noticeType='위해상품')}">위해상품</a>
                </li>

                <li th:classappend="${noticeType == '이벤트당첨'} ? 'active'">
                    <a th:href="@{/cs/notice/list(noticeType='이벤트당첨')}">이벤트당첨</a>
                </li>
            </ul>
        </aside>

        <!-- 컨텐츠 -->
        <section class="cs-content">
            <div class="content-header">
                <h2 th:text="${noticeType != null and noticeType != '' ? noticeType : '공지사항'}">
                    공지사항
                </h2>

                <p th:if="${noticeType == null or noticeType == ''}">
                    케이마켓의 새로운 소식과 안내사항을 확인하세요.
                </p>

                <p th:if="${noticeType != null and noticeType != ''}"
                   th:text="${noticeType + ' 관련 공지사항입니다.'}">
                    고객서비스 관련 공지사항입니다.
                </p>
            </div>

            <table class="notice-table">
                <tbody>

                <tr th:each="notice : ${noticeDTOList}">
                    <td>
                        <a th:href="@{/cs/notice/view(
                                                    noticeNo=${notice.noticeNo},
                                                    pg=${page.currentPage}
                        )}">
                            [ [[${notice.noticeType}]] ] [[${notice.title}]]
                        </a>
                    </td>
                    <td>
                        [[${#temporals.format(notice.regDate, 'yy.MM.dd')}]]
                    </td>
                </tr>

                </tbody>
            </table>

            <div class="pagination">

                <!-- 이전 -->
                <a th:if="${page.startPage > 1}"
                   th:href="@{/cs/notice/list(pg=${page.startPage - 1}, noticeType=${noticeType})}"
                   class="page-btn">이전</a>

                <!-- 페이지 번호 -->
                <th:block th:each="i : ${#numbers.sequence(page.startPage, page.endPage)}">
                    <a th:href="@{/cs/notice/list(pg=${i}, noticeType=${noticeType})}"
                       th:text="${i}"
                       th:classappend="${i == page.currentPage} ? ' active' : ''">
                    </a>
                </th:block>

                <!-- 다음 -->
                <a th:if="${page.endPage < page.lastPage}"
                   th:href="@{/cs/notice/list(pg=${page.endPage + 1}, noticeType=${noticeType})}"
                   class="page-btn">다음</a>

            </div>
        </section>
    </div>
</main>

<th:block th:replace="~{common/_main_footer}"></th:block>

</body>
</html>
