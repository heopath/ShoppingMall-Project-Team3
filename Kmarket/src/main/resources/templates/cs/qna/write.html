<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문의하기 글작성</title>
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/cs/common.css" />
    <link rel="stylesheet" href="../../css/cs/qna/write.css" />
  </head>
  <body>
  <th:block th:replace="~{common/_main_header}"></th:block>

    <main class="main-layout">
      <div class="breadcrumb">
        <a th:href="@{/cs/index}">홈</a>
        <span>></span>
        <span>문의하기</span>
      </div>

      <div class="cs-layout">
        <!-- 사이드바 -->
        <aside class="cs-sidebar">
          <h3>문의하기</h3>

          <ul>
            <li th:classappend="${parentNo == 1} ? 'active'">
              <a th:href="@{/cs/qna/write(parentNo=1)}">회원</a>
            </li>

            <li th:classappend="${parentNo == 2} ? 'active'">
              <a th:href="@{/cs/qna/write(parentNo=2)}">주문·결제</a>
            </li>

            <li th:classappend="${parentNo == 3} ? 'active'">
              <a th:href="@{/cs/qna/write(parentNo=3)}">배송</a>
            </li>

            <li th:classappend="${parentNo == 4} ? 'active'">
              <a th:href="@{/cs/qna/write(parentNo=4)}">취소·반품·교환</a>
            </li>

            <li th:classappend="${parentNo == 5} ? 'active'">
              <a th:href="@{/cs/qna/write(parentNo=5)}">상품</a>
            </li>
          </ul>
        </aside>

        <!-- 컨텐츠 -->
        <section class="cs-content">
          <div class="content-header">
            <h2 th:switch="${parentNo}">
              <span th:case="1">회원</span>
              <span th:case="2">주문·결제</span>
              <span th:case="3">배송</span>
              <span th:case="4">취소·반품·교환</span>
              <span th:case="5">상품</span>
              <span th:case="*">문의하기</span>
            </h2>

            <p th:switch="${parentNo}">
              <span th:case="1">회원 관련 문의내용 입니다.</span>
              <span th:case="2">주문·결제 관련 문의내용 입니다.</span>
              <span th:case="3">배송 관련 문의내용 입니다.</span>
              <span th:case="4">취소·반품·교환 관련 문의내용 입니다.</span>
              <span th:case="5">상품 관련 문의내용 입니다.</span>
              <span th:case="*">문의내용 입니다.</span>
            </p>
          </div>

          <form class="write-form" th:action="@{/cs/qna/write}" method="post">
            <input type="hidden" name="parentNo" th:value="${parentNo}">

            <div class="form-row">
              <label>문의유형</label>

              <div class="category-wrap">
                <select id="cate1" disabled>

                  <option
                          th:each="parent : ${parentCategoryList}"
                          th:value="${parent.csCateNo}"
                          th:text="${parent.cateName}"
                          th:selected="${parent.csCateNo == parentNo}">
                  </option>

                </select>

                <select id="cate2" name="csCateNo" required>

                  <option value="" selected disabled>2차 유형 선택</option>

                  <option
                          th:each="child : ${childCategoryList}"
                          th:value="${child.csCateNo}"
                          th:text="${child.cateName}">
                  </option>

                </select>
              </div>
            </div>

            <div class="form-row">
              <label>제목</label>

              <input type="text" name="title" placeholder="제목을 입력하세요." required/>
            </div>

            <div class="form-row">
              <label>내용</label>

              <textarea name="content" placeholder="내용을 입력하세요." required></textarea>
            </div>

            <div class="btn-area">
              <a th:href="@{/cs/qna/list(parentNo=${parentNo})}"
                 class="btn-cancel">
                취소하기
              </a>

              <button type="submit" class="btn-submit">등록하기</button>
            </div>
          </form>
        </section>
      </div>
    </main>

  <th:block th:replace="~{common/_main_footer}"></th:block>

  </body>
</html>
