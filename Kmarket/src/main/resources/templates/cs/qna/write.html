<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문의하기 글작성</title>
    <link rel="stylesheet" href="../../css/main.css" />
    <link rel="stylesheet" href="../../css/cs/common.css" />
    <link rel="stylesheet" href="../../css/cs/qna/write.css" />
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const cateMap = {
          member: ["가입", "로그인", "회원정보", "탈퇴"],
          coupon: ["쿠폰", "포인트", "이벤트", "당첨"],
          order: ["주문조회", "결제오류", "현금영수증", "영수증"],
          delivery: ["배송조회", "배송지변경", "배송지연", "배송완료"],
          cancel: ["취소", "반품", "교환"],
          travel: ["여행", "숙박", "항공"],
          safe: ["사기신고", "분쟁조정", "계정도용"],
        };

        const cate1 = document.getElementById("cate1");
        const cate2 = document.getElementById("cate2");

        cate1.addEventListener("change", function () {
          const list = cateMap[this.value];

          cate2.innerHTML = '<option value="">2차 유형 선택</option>';

          if (!list) return;

          list.forEach(function (item) {
            cate2.innerHTML += `<option>${item}</option>`;
          });
        });
      });
    </script>
  </head>
  <body>
  <th:block th:replace="~{common/_main_header}"></th:block>

  </header>

    <main class="main-layout">
      <div class="breadcrumb">
        <a href="#">홈</a>
        <span>></span>
        <span>문의하기</span>
      </div>

      <div class="cs-layout">
        <!-- 사이드바 -->
        <aside class="cs-sidebar">
          <h3>문의하기</h3>

          <ul>
            <li class="active"><a href="#">회원</a></li>
            <li><a href="#">쿠폰 / 이벤트</a></li>
            <li><a href="#">주문 / 결제</a></li>
            <li><a href="#">배송</a></li>
            <li><a href="#">취소 / 반품 / 교환</a></li>
            <li><a href="#">여행 / 숙박 / 항공</a></li>
            <li><a href="#">안전거래</a></li>
          </ul>
        </aside>

        <!-- 컨텐츠 -->
        <section class="cs-content">
          <div class="content-header">
            <h2>회원</h2>
            <p>회원 관련 문의내용 입니다.</p>
          </div>

          <form class="write-form">
            <div class="form-row">
              <label>문의유형</label>

              <div class="category-wrap">
                <select id="cate1">
                  <option value="">1차 유형 선택</option>
                  <option value="member">회원</option>
                  <option value="coupon">쿠폰 / 이벤트</option>
                  <option value="order">주문 / 결제</option>
                  <option value="delivery">배송</option>
                  <option value="cancel">취소 / 반품 / 교환</option>
                  <option value="travel">여행 / 숙박 / 항공</option>
                  <option value="safe">안전거래</option>
                </select>

                <select id="cate2">
                  <option value="">2차 유형 선택</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <label>제목</label>

              <input type="text" placeholder="제목을 입력하세요." />
            </div>

            <div class="form-row">
              <label>내용</label>

              <textarea placeholder="내용을 입력하세요."></textarea>
            </div>

            <div class="btn-area">
              <a href="./list.html" class="btn-cancel"> 취소하기 </a>

              <button type="submit" class="btn-submit">등록하기</button>
            </div>
          </form>
        </section>
      </div>
    </main>

  <th:block th:replace="~{common/_main_footer}"></th:block>

  </body>
</html>
