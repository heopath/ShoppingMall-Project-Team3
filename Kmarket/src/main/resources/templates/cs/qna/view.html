  <main class="main-layout">
      <div class="breadcrumb">
        <a href="#">홈</a>

        <a href="#">문의하기</a>
        <span>></span>
        <span>회원</span>
      </div>

      <div class="cs-layout">
        <!-- 사이드바 -->
        <aside class="cs-sidebar">
          <h3>문의하기</h3>

          <ul>
            <li class="active"><a href="#">회원</a></li>
            <li><a href="#">쿠폰 / 이벤트</a></li>
            <li><a href="#">주문 / 결제</a></li>

        <!-- 본문 -->
        <section class="cs-content">

            <h2>회원</h2>
            <p>회원 관련 문의내용 입니다.</p>
          </div>

          <div class="inquiry-view">
            <!-- 질문 -->
            <div class="question-box">
              <div class="question-header">
                <h3>[가입] 가입문의내용</h3>

                <div class="question-meta">
                  <span>chh***</span>
                  <span>22.11.21</span>
                </div>
              </div>

              <div class="question-body">
                회원가입하고 싶어요. 어떻게 해야하나요?
              </div>
            </div>

            <!-- 답변 -->
            <div class="answer-box">
              <div class="answer-header">
                <span class="answer-badge"> 답변완료 </span>

                <span class="answer-date"> 22.11.21 </span>
              </div>

              <div class="answer-body">
                안녕하세요. 회원님 문의주신 내용에 답변드립니다. 회원가입
                메뉴에서 본인인증 후 가입을 진행하시면 됩니다. 감사합니다.
              </div>
            </div>
          </div>

          <div class="view-btn-area">
            <a href="./list.html" class="btn-list"> 목록 </a>
