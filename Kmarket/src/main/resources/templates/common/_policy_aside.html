<aside class="side-cat">
    <div class="category-box">
        <h3>카테고리</h3>
        <ul class="category-list">
            <li class="category-item" th:each="category : ${categoryTree}">
                <button type="button" class="category-title"
                        th:attr="aria-expanded=false"
                        th:disabled="${#lists.isEmpty(category.children)}">
                    <span th:text="${category.cateName}">카테고리명</span>
                    <span class="arrow" th:if="${!#lists.isEmpty(category.children)}">+</span>
                </button>

                <ul class="sub-category"
                    th:if="${!#lists.isEmpty(category.children)}"
                    hidden>
                    <li th:each="sub : ${category.children}">
                        <a th:href="@{/product/list(cateNo=${sub.cateNo})}"
                           th:text="${sub.cateName}">하위 카테고리</a>
                    </li>
                </ul>
            </li>

            <li class="category-empty" th:if="${#lists.isEmpty(categoryTree)}">
                등록된 카테고리가 없습니다.
            </li>
        </ul>
    </div>
    <script th:src="@{/js/policy-category.js}" defer></script>
</aside>
