<link rel="stylesheet" th:href="@{/css/common/notification.css}" />
<link rel="stylesheet" th:href="@{/css/common/page-loading.css}" />
<script th:src="@{/js/common/notification.js}" defer="defer"></script>
<script th:src="@{/js/common/page-loading.js}" defer="defer"></script>

<!-- 페이지 로딩 화면 -->
<div class="page-loading" id="pageLoading" role="status" aria-live="polite">
    <div class="page-loading-card">
        <div class="page-loading-mark" aria-hidden="true">
            <span></span><span></span><span></span>
        </div>
        <strong>K-Market</strong>
        <p>즐거운 쇼핑을 준비하고 있어요</p>
    </div>
</div>

<!-- Top ad banner -->
<div class="top-bar"
     th:if="${topBanner != null}"
     th:style="${topBanner.bgColor != null ? 'background-color:' + topBanner.bgColor : ''}">
    <a th:href="${topBanner.linkUrl != null ? topBanner.linkUrl : '#'}"
       class="top-ad">
        <img th:src="${topBanner.imagePath}"
             th:alt="${topBanner.bannerName}" />
    </a>
</div>

<!-- DB 배너가 없을 때 기본 이미지 -->
<div class="top-bar" th:unless="${topBanner != null}">
    <a href="#" class="top-ad">
        <img src="/images/main/vip_plcc_banner.png"
             alt="K-Market 최상단 광고 배너" />
    </a>
</div>

<header>
    <a th:href="@{/}" class="logo-img">
        <img th:if="${settings.header_logo != null and settings.header_logo != ''}"
             th:src="${settings.header_logo}"
             onerror="this.onerror=null; this.src='/images/main/header_logo.png';"
             alt="K-Market 로고" />

        <img th:if="${settings.header_logo == null or settings.header_logo == ''}"
             src="/images/main/header_logo.png"
             alt="K-Market 기본 로고" />
    </a>

    <form class="search-box"
          th:action="@{/product/search}"
          method="get">
        <input type="text"
               name="keyword"
               th:value="${keyword}"
               placeholder="상품, 브랜드를 검색해보세요" />

        <button type="submit" aria-label="검색">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 21l-4.35-4.35m1.35-5.65a7 7 0 11-14 0 7 7 0 0114 0z"
                      stroke="#fff"
                      stroke-width="2"
                      fill="none"
                      stroke-linecap="round" />
            </svg>
        </button>
    </form>

    <!-- 로그인 사용자 메뉴 -->
    <nav class="header-links"
         th:if="${#authorization.expression('isAuthenticated()')}">
        <span class="login-user">
            안녕하세요,
            <span class="name" th:text="${#authentication.principal.member.name}"></span><span class="suffix">님</span>
        </span>

        <div class="notification-wrap" id="notificationWrap">
            <button type="button"
                    class="notification-button"
                    id="notificationButton"
                    aria-label="알림 목록 열기"
                    aria-expanded="false">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4" />
                </svg>
                <span class="notification-badge" id="notificationBadge" hidden="hidden">0</span>
            </button>

            <section class="notification-panel"
                     id="notificationPanel"
                     aria-label="알림 목록"
                     hidden="hidden">
                <div class="notification-panel-head">
                    <div>
                        <strong>알림</strong>
                        <span id="notificationSummary">새 알림이 없습니다.</span>
                    </div>
                    <button type="button"
                            class="notification-panel-close"
                            id="notificationPanelClose"
                            aria-label="알림 목록 닫기">×</button>
                </div>
                <div class="notification-list" id="notificationList">
                    <p class="notification-empty">알림을 불러오는 중입니다.</p>
                </div>
            </section>
        </div>

        <a th:href="@{/member/logout}">로그아웃</a>
        <a th:href="@{/my/home}">마이페이지</a>
        <a th:href="@{/product/cart}">장바구니</a>
        <a th:href="@{/cs/index}">고객센터</a>
        <a th:if="${#authorization.expression('hasRole(''SELLER'')')}"
           class="header-role-link"
           th:href="@{/admin/product/list}">판매자</a>
        <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
           class="header-role-link"
           th:href="@{/admin}">관리자</a>
    </nav>

    <!-- 비로그인 사용자 메뉴 -->
    <nav class="header-links"
         th:if="${#authorization.expression('isAnonymous()')}">
        <a th:href="@{/member/login}">로그인</a>
        <a th:href="@{/member/join}">회원가입</a>
    </nav>
</header>

<!-- GNB -->
<nav class="gnb">
    <div class="gnb-inner">
        <a th:href="@{/#hit}">히트상품</a>
        <a th:href="@{/#recommend}">추천상품</a>
        <a th:href="@{/#new}">최신상품</a>
        <a th:href="@{/#popular}">인기상품</a>
        <a th:href="@{/#discount}">할인상품</a>
    </div>
</nav>
